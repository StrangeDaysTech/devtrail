version: "4.3.0"
description: "DevTrail distribution manifest"
repository: "https://github.com/StrangeDaysTech/devtrail"

# Files included when running `devtrail init`
files:
  # Core framework
  - .devtrail/

  # Unified rules file
  - DEVTRAIL.md

  # Agent skills
  - .claude/skills/
  - .gemini/skills/
  - .agent/workflows/

  # CI/CD
  - .github/workflows/docs-validation.yml

# Files that are injected into existing directive files
# (not copied, but merged via markers)
injections:
  - target: CLAUDE.md
    template: dist-templates/directives/CLAUDE.md
  - target: GEMINI.md
    template: dist-templates/directives/GEMINI.md
  - target: .github/copilot-instructions.md
    template: dist-templates/directives/copilot-instructions.md
  - target: .cursorrules
    template: dist-templates/directives/cursorrules
    embed: DEVTRAIL.md
  - target: .cursor/rules/devtrail.md
    template: dist-templates/directives/cursor-rules-devtrail.md
    embed: DEVTRAIL.md
